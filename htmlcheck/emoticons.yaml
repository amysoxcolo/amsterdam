prefixChars: ":;"
emoticons:
  - name: smile
    patterns:
      - ":)"
    replace: "😊"
  - name: frown
    patterns:
      - ":("
    replace: "🙁"
  - name: redface
    patterns:
      - ":o"
      - ":O"
    replace: "😳"
  - name: biggrin
    patterns:
      - ":D"
    replace: "😁"
  - name: wink
    patterns:
      - ";)"
    replace: "😉"
  - name: tongue
    patterns:
      - ":p"
      - ":P"
    replace: "😛"
  - name: cool
    patterns:
      - ":cool:"
    replace: "😎"
  - name: rolleyes
    patterns:
      - ":rolleyes:"
    replace: "🙄"
  - name: mad
    patterns:
      - ":mad:"
    replace: "😡"
  - name: eek
    patterns:
      - ":eek:"
    replace: "😱"
  - name: confused
    patterns:
      - ":confused:"
    replace: "😕"
