configs:
  - name: "post-body"
    wordWrap: 55
    angles: true
    parens: true
    discardHTML: false
    outputFilters:
      - html
    stringRewriters:
      - emoticon
      - email
      - url
    tagRewriters:
      - emoticon_tag
      - postlink
      - userlink
      - email
      - url
    parenRewriters:
      - userlink
    tagSet: normal
  - name: "post-pseud"
    wordWrap: 0
    angles: true
    parens: false
    discardHTML: false
    outputFilters:
      - html
    tagSet: restricted
  - name: "preview"
    wordWrap: 55
    angles: true
    parens: true
    discardHTML: false
    outputFilters:
      - html
    stringRewriters:
      - emoticon
      - email
      - url
