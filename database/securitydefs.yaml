scopes:
  - name: Global
    index: 0
  - name: Community
    index: 3
  - name: Conference
    index: 6
roles:
  - name: "NotInList"
    display: "(not in list)"
    scope: Global
    value: "0"
  - name: "UnrestrictedUser"
    display: "Unrestricted User"
    scope: Global
    value: "32500"
  - name: "NoAccess"
    display: "No Access"
    scope: Global
    value: "65500"
  - name: "Global.Anonymous"
    display: "Anonymous User"
    scope: Global
    value: "L+100"
  - name: "Global.Unverified"
    display: "Unauthenticated User"
    scope: Global
    value: "L+500"
  - name: "Global.Normal"
    display: "Normal User"
    scope: Global
    value: "L+1000"
  - name: "Global.AnyAdmin"
    display: "Any System Administrator"
    scope: Global
    value: "HMIN"
  - name: "Global.PFY"
    display: "System Assistant Administrator"
    scope: Global
    value: "H+1000"
  - name: "Global.BOFH"
    display: "Global System Administrator"
    scope: Global
    value: "HMAX"
  - name: "Community.Member"
    display: "Community Member"
    scope: Community
    value: "L+500"
  - name: "Community.AnyAdmin"
    display: "Any Community Administrator"
    scope: Community
    value: "HMIN"
  - name: "Community.Cohost"
    display: "Community Co-Host"
    scope: Community
    value: "H+1000"
  - name: "Community.Host"
    display: "Community Host"
    scope: Community
    value: "H+1500"
  - name: "Conference.Member"
    display: "Conference Member"
    scope: Conference
    value: "L+500"
  - name: "Conference.AnyAdmin"
    display: "Any Conference Administrator"
    scope: Conference
    value: "HMIN"
  - name: "Conference.Host"
    display: "Conference Host"
    scope: Conference
    value: "H+1500"
defaults:
  - name: "Global.NewUser"
    role: "Global.Unverified"
  - name: "Global.AfterVerify"
    role: "Global.Normal"
  - name: "Global.AfterEmailChange"
    role: "Global.Unverified"
  - name: "Community.NewUser"
    role: "Community.Member"
  - name: "Community.Creator"
    role: "Community.Host"
  - name: "Conference.HostPrivs"
    role: "Conference.AnyAdmin"
  - name: "Conference.NewUser"
    role: "Conference.Member"
  - name: "Conference.NewHost"
    role: "Conference.Host"
  - name: "Conference.Creator"
    role: "Conference.Host"
  - name: "Conference.Read.Public"
    role: "Community.Member"
  - name: "Conference.Read.Private"
    role: "Conference.Member"
  - name: "Conference.Post.Public"
    role: "Community.Member"
  - name: "Conference.Post.Private"
    role: "Conference.Member"
  - name: "Conference.Create.Public"
    role: "Community.Member"
  - name: "Conference.Create.Private"
    role: "Conference.Member"
lists:
  - name: "Global.UserLevels"
    roles:
      - "Global.Anonymous"
      - "Global.Unverified"
      - "Global.Normal"
      - "UnrestrictedUser"
  - name: "Global.UserLevelsPFY"
    roles:
      - "Global.Anonymous"
      - "Global.Unverified"
      - "Global.Normal"
      - "UnrestrictedUser"
      - "Global.PFY"
  - name: "Global.AllUserLevels"
    roles:
      - "Global.Anonymous"
      - "Global.Unverified"
      - "Global.Normal"
      - "UnrestrictedUser"
      - "Global.PFY"
      - "Global.BOFH"
  - name: "Global.CreateCommunity"
    default: "Global.Normal"
    roles:
      - "Global.Normal"
      - "UnrestrictedUser"
      - "Global.AnyAdmin"
      - "Global.PFY"
      - "Global.BOFH"
  - name: "Community.Read"
    default: "Community.Member"
    roles:
      - "Global.Anonymous"
      - "Global.Unverified"
      - "Global.Normal"
      - "Community.Member"
      - "UnrestrictedUser"
      - "Community.AnyAdmin"
      - "Community.Cohost"
      - "Community.Host"
      - "Global.AnyAdmin"
  - name: "Community.Write"
    default: "Community.Cohost"
    roles:
      - "Community.AnyAdmin"
      - "Community.Cohost"
      - "Community.Host"
      - "Global.AnyAdmin"
      - "Global.PFY"
      - "Global.BOFH"
  - name: "Community.Create"
    default: "Community.Cohost"
    roles:
      - "Global.Normal"
      - "Community.Member"
      - "UnrestrictedUser"
      - "Community.AnyAdmin"
      - "Community.Cohost"
      - "Community.Host"
      - "Global.AnyAdmin"
  - name: "Community.Delete"
    default: "Community.Host"
    roles:
      - "Community.AnyAdmin"
      - "Community.Cohost"
      - "Community.Host"
      - "Global.AnyAdmin"
      - "Global.PFY"
      - "Global.BOFH"
      - "NoAccess"
  - name: "Community.Join"
    default: "Global.Normal"
    roles:
      - "Global.Anonymous"
      - "Global.Unverified"
      - "Global.Normal"
  - name: "Community.Userlevels"
    roles:
      - "NotInList"
      - "Global.Anonymous"
      - "Global.Unverified"
      - "Global.Normal"
      - "Community.Member"
      - "UnrestrictedUser"
      - "Community.Cohost"
  - name: "Community.AllUserlevels"
    roles:
      - "NotInList"
      - "Global.Anonymous"
      - "Global.Unverified"
      - "Global.Normal"
      - "Community.Member"
      - "UnrestrictedUser"
      - "Community.Cohost"
      - "Community.Host"
      - "Global.PFY"
      - "Global.BOFH"
  - name: "Conference.Read"
    roles:
      - "Global.Anonymous"
      - "Global.Unverified"
      - "Global.Normal"
      - "Community.Member"
      - "Conference.Member"
      - "UnrestrictedUser"
  - name: "Conference.Post"
    roles:
      - "Global.Anonymous"
      - "Global.Unverified"
      - "Global.Normal"
      - "Community.Member"
      - "Conference.Member"
      - "UnrestrictedUser"
      - "Conference.AnyAdmin"
      - "Conference.Host"
  - name: "Conference.Create"
    roles:
      - "Global.Anonymous"
      - "Global.Unverified"
      - "Global.Normal"
      - "Community.Member"
      - "Conference.Member"
      - "UnrestrictedUser"
      - "Conference.AnyAdmin"
      - "Conference.Host"
  - name: "Conference.Hide"
    default: "Conference.Host"
    roles:
      - "Conference.AnyAdmin"
      - "Conference.Host"
      - "Community.AnyAdmin"
      - "Community.Cohost"
      - "Community.Host"
      - "Global.AnyAdmin"
  - name: "Conference.Nuke"
    default: "Conference.Host"
    roles:
      - "Conference.AnyAdmin"
      - "Conference.Host"
      - "Community.AnyAdmin"
      - "Community.Cohost"
      - "Community.Host"
      - "Global.AnyAdmin"
  - name: "Conference.Change"
    default: "Conference.Host"
    roles:
      - "Conference.AnyAdmin"
      - "Conference.Host"
      - "Community.AnyAdmin"
      - "Community.Cohost"
      - "Community.Host"
      - "Global.AnyAdmin"
  - name: "Conference.Delete"
    default: "Community.Cohost"
    roles:
      - "Community.AnyAdmin"
      - "Community.Cohost"
      - "Community.Host"
      - "Global.AnyAdmin"
      - "Global.PFY"
      - "Global.BOFH"
      - "NoAccess"
  - name: "Conference.UserLevels"
    roles:
      - "NotInList"
      - "Global.Anonymous"
      - "Global.Unverified"
      - "Global.Normal"
      - "Community.Member"
      - "Conference.Member"
      - "UnrestrictedUser"
      - "Conference.Host"
permissions:
  - name: "Global.ShowHiddenCategories"
    role: "Global.AnyAdmin"
  - name: "Global.NoEmailVerify"
    role: "Global.AnyAdmin"
  - name: "Global.SeeHiddenContactInfo"
    role: "Global.AnyAdmin"
  - name: "Global.SearchHiddenCommunities"
    role: "Global.AnyAdmin"
  - name: "Global.ShowHiddenCommunities"
    role: "Global.AnyAdmin"
  - name: "Global.SearchHiddenCategories"
    role: "Global.AnyAdmin"
  - name: "Global.SysAdminAccess"
    role: "Global.AnyAdmin"
  - name: "Global.PublishFP"
    role: "Global.AnyAdmin"
  - name: "Global.DesignatePFY"
    role: "Global.BOFH"
  - name: "Community.ShowAdmin"
    role: "Community.AnyAdmin"
  - name: "Community.NoJoinRequired"
    role: "Global.AnyAdmin"
  - name: "Community.NoKeyRequired"
    role: "Global.AnyAdmin"
  - name: "Community.ShowHiddenMembers"
    role: "Community.AnyAdmin"
  - name: "Community.ShowHiddenObjects"
    role: "Community.AnyAdmin"
  - name: "Community.MassMail"
    role: "Community.AnyAdmin"
  - name: "Conference.EMailParticipants"
    role: "Conference.AnyAdmin"
