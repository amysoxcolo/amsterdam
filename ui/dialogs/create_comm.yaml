name: "create.community"
formName: "createcommform"
menuSelector: "top"
title: "Create New Community"
action: "/create_comm"
fields:
  - type: "header"
    name: "header1"
    caption: "Basic Information"
  - type: "text"
    name: "name"
    caption: "Community Name"
    required: true
    size: 32
    maxlength: 128
  - type: "ams_id"
    name: "alias"
    caption: "Community Alias"
    required: true
    size: 32
    maxlength: 32
  - type: "text"
    name: "synopsis"
    caption: "Synopsis"
    size: 32
    maxlength: 255
  - type: "text"
    name: "rules"
    caption: "Rules"
    size: 32
    maxlength: 255
  - type: "localelist"
    name: "language"
    caption: "Primary Language"
    required: true
  - type: "header"
    name: "header2"
    caption: "Location"
  - type: "text"
    name: "loc"
    caption: "City"
    required: true
    size: 32
    maxlength: 64
  - type: "text"
    name: "reg"
    caption: "State/Province"
    required: true
    size: 32
    maxlength: 64
  - type: "text"
    name: "pcode"
    caption: "Zip/Postal Code"
    required: true
    size: 32
    maxlength: 64
  - type: "countrylist"
    name: "country"
    caption: "Country"
    required: true
  - type: "header"
    name: "header3"
    caption: "Security"
  - type: "dropdown"
    name: "comtype"
    caption: "Community type"
    required: true
    choices:
      - id: "0"
        text: "Public"
        default: true
      - id: "1"
        text: "Private"
  - type: "text"
    name: "joinkey"
    caption: "Join Key"
    subcaption: "(for private communities)"
    size: 32
    maxlength: 64
  - type: "dropdown"
    name: "hidemode"
    caption: "Community visibility"
    required: true
    choices:
      - id: "NONE"
        text: "Show in both directory and search"
        default: true
      - id: "DIRECTORY"
        text: "Hide in directory, but not in search"
      - id: "BOTH"
        text: "Hide in both directory and search"
  - type: "button"
    name: "create"
    caption: "Create"
    param: "blue"
  - type: "button"
    name: "cancel"
    caption: "Cancel"
    param: "red"
