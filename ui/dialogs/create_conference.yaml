name: "conf.create"
formName: "newconfform"
menuSelector: "community"
title: "Create New Conference"
action: "/comm/[CID]/create_conf"
fields:
  - type: "text"
    name: "name"
    caption: "Conference Name"
    required: true
    size: 32
    maxlength: 128
  - type: "ams_id"
    name: "alias"
    caption: "Conference Alias"
    required: true
    size: 32
    maxlength: 64
  - type: "text"
    name: "descr"
    caption: "Description"
    required: false
    size: 32
    maxlength: 255
  - type: "dropdown"
    name: "ctype"
    caption: "Conference type"
    required: true
    choices:
      - id: "0"
        text: "Public"
        default: true
      - id: "1"
        text: "Private"
  - type: "checkbox"
    name: "hide"
    caption: "Hide conference in the community's conference list"
  - type: "button"
    name: "create"
    caption: "Create"
    param: "blue"
  - type: "button"
    name: "cancel"
    caption: "Cancel"
    param: "red"
