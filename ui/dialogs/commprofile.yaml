name: "community.profile"
formName: "comprofform"
menuSelector: "community"
title: "Edit Community Profile:"
subtitle: "[CNAME]"
action: "/comm/[CID]/admin/profile"
fields:
  - type: "header"
    name: "header1"
    caption: "Basic Information"
  - type: "text"
    name: "name"
    caption: "Community Name"
    required: true
    size: 32
    maxlength: 128
  - type: "ams_id"
    name: "alias"
    caption: "Community Alias"
    required: true
    size: 32
    maxlength: 32
  - type: "text"
    name: "synopsis"
    caption: "Synopsis"
    size: 32
    maxlength: 255
  - type: "text"
    name: "rules"
    caption: "Rules"
    size: 32
    maxlength: 255
  - type: "localelist"
    name: "language"
    caption: "Primary Language"
    required: true
  - type: "text"
    name: "url"
    caption: "Home Page"
    subcaption: "(URL)"
    size: 32
    maxlength: 255
  - type: "communitylogo"
    name: "logo"
    caption: "Community logo"
    param: "/comm/[CID]/admin/logo"
  - type: "header"
    name: "header2"
    caption: "Location"
  - type: "text"
    name: "company"
    caption: "Company"
    size: 32
    maxlength: 255
  - type: "text"
    name: "addr1"
    caption: "Address"
    size: 32
    maxlength: 255
  - type: "text"
    name: "addr2"
    caption: "Address"
    subcaption: "(line 2)"
    size: 32
    maxlength: 255
  - type: "text"
    name: "loc"
    caption: "City"
    required: true
    size: 32
    maxlength: 64
  - type: "text"
    name: "reg"
    caption: "State/Province"
    required: true
    size: 32
    maxlength: 64
  - type: "text"
    name: "pcode"
    caption: "Zip/Postal Code"
    required: true
    size: 32
    maxlength: 64
  - type: "countrylist"
    name: "country"
    caption: "Country"
    required: true
  - type: "header"
    name: "header3"
    caption: "Security"
  - type: "dropdown"
    name: "comtype"
    caption: "Community type"
    required: true
    choices:
      - id: "0"
        text: "Public"
        default: true
      - id: "1"
        text: "Private"
  - type: "text"
    name: "joinkey"
    caption: "Join Key"
    subcaption: "(for private communities)"
    size: 32
    maxlength: 64
  - type: "checkbox"
    name: "membersonly"
    caption: "Allow only members to access this community"
  - type: "dropdown"
    name: "hidemode"
    caption: "Community visibility"
    required: true
    choices:
      - id: "NONE"
        text: "Show in both directory and search"
        default: true
      - id: "DIRECTORY"
        text: "Hide in directory, but not in search"
      - id: "BOTH"
        text: "Hide in both directory and search"
  - type: "rolelist"
    name: "read_lvl"
    caption: "Security level required to read contents"
    required: true
    param: "Community.Read"
  - type: "rolelist"
    name: "write_lvl"
    caption: "Security level required to update profile"
    required: true
    param: "Community.Write"
  - type: "rolelist"
    name: "create_lvl"
    caption: "Security level required to create new subobjects"
    required: true
    param: "Community.Create"
  - type: "rolelist"
    name: "delete_lvl"
    caption: "Security level required to delete community"
    required: true
    param: "Community.Delete"
  - type: "rolelist"
    name: "join_lvl"
    caption: "Security level required to join community"
    required: true
    param: "Community.Join"
  - type: "header"
    name: "header4"
    caption: "Conferencing Options"
  - type: "checkbox"
    name: "pic_in_post"
    caption: "Display user pictures next to posts in conferences"
    subcaption: "(by default; user can override)"
  - type: "button"
    name: "update"
    caption: "Update"
    param: "blue"
  - type: "button"
    name: "cancel"
    caption: "Cancel"
    param: "red"
