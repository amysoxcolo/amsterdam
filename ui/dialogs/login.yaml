name: "login"
formName: "loginform"
menuSelector: "top"
title: "Log In"
action: "/TODO/login"
instructions: >
  Forgot your password?  Enter your user name and click the <b>Reminder</b> button to receive
  a password reminder via E-mail.
fields:
  - type: "hidden"
    name: "tgt"
    value: ""
  - type: "ams_id"
    name: "user"
    caption: "User Name"
    size: 32
    maxlength: 64
  - type: "password"
    name: "pass"
    caption: "Password"
    size: 32
    maxlength: 128
  - type: "checkbox"
    name: "saveme"
    caption: "Remember me for next time so I can log in automatically"
  - type: "button"
    name: "login"
    caption: "Log In"
    param: "blue"
  - type: "button"
    name: "remind"
    caption: "Password Reminder"
    param: "gray"
  - type: "button"
    name: "cancel"
    caption: "Cancel"
    param: "red"
